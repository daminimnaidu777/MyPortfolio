<!DOCTYPE html>
<html>
<head>
    <title>Messages</title>
</head>

<body>

<h1>All Messages</h1>

{% for msg in data %}
<div>
    <p><b>Name:</b> {{ msg[1] }}</p>
    <p><b>Email:</b> {{ msg[2] }}</p>
    <p><b>Message:</b> {{ msg[3] }}</p>
    <hr>
</div>
{% endfor %}

<a href="/">Back</a>

</body>
</html>
