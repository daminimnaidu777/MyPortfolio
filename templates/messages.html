<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1 style="text-align:center;">📩 Messages</h1>

<table border="1" style="margin:auto;">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Message</th>
</tr>

{% for msg in data %}
<tr>
<td>{{ msg[0] }}</td>
<td>{{ msg[1] }}</td>
<td>{{ msg[2] }}</td>
<td>{{ msg[3] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
