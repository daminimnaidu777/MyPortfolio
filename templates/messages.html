<!DOCTYPE html>
<html>
<head>
    <title>Admin - Messages</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1 style="text-align:center;">📩 Admin Panel - Messages</h1>

<table class="table">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
    </tr>

    {% for msg in data %}
    <tr>
        <td>{{ msg[0] }}</td>
        <td>{{ msg[1] }}</td>
        <td>{{ msg[2] }}</td>
        <td>{{ msg[3] }}</td>
    </tr>
    {% endfor %}
</table>

<div style="text-align:center;">
    <a href="/" class="btn">Back to Home</a>
</div>

</body>
</html>
